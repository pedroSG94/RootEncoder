name: Integration (RTMP / MediaMTX)

# PoC: spin up a real streaming server (MediaMTX) and run a connection test against it.
# MediaMTX speaks RTMP/RTSP/SRT/WHIP, so the same job can be extended to the other modules.
on:
  workflow_dispatch:
  pull_request:
    branches: [ "master" ]

jobs:
  rtmp-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Start MediaMTX
        run: |
          TAG=$(curl -fsSL https://api.github.com/repos/bluenviron/mediamtx/releases/latest | jq -r .tag_name)
          echo "Using MediaMTX $TAG"
          curl -fsSL -o mediamtx.tar.gz \
            "https://github.com/bluenviron/mediamtx/releases/download/${TAG}/mediamtx_${TAG}_linux_amd64.tar.gz"
          tar xzf mediamtx.tar.gz
          ./mediamtx > mediamtx.log 2>&1 &
          echo "Waiting for RTMP port 1935..."
          for i in $(seq 1 30); do
            nc -z 127.0.0.1 1935 && { echo "MediaMTX is up"; break; }
            sleep 1
          done

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run RTMP integration test
        env:
          RTMP_INTEGRATION: "true"
          RTMP_URL: "rtmp://127.0.0.1:1935/live/test"
        run: ./gradlew :rtmp:testDebugUnitTest --tests "com.pedro.rtmp.integration.RtmpConnectionIntegrationTest"

      - name: Upload MediaMTX log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mediamtx-log
          path: mediamtx.log
          if-no-files-found: ignore
